<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirección por CP</title>
</head>
<body onload = "cargarDatos()">
    <div>
        <h1>Dirección por Código Postal</h1>
    </div>
    <div>
        <label>Código postal</label>
        <input type="text" id="cajaDeTextoCP"/>
        
        <input type="button" value = "Guardar" onclick="cargarSelectAlcaldiasCP()"/>
        <br/>

        <label>Estados</label>
            <select name="estados" id="selectEstados" onchange = "cargarSelectAlcaldias()">
                <option value="">Seleccione estado</option>
            </select>
            <label for="" id = "msjCargando">Cargando datos...</label>
        <br/>

        <label>Alcaldia o municipio</label>
            <select name="alcaldias" id="selectAlcaldias">
                <option value="">Seleccione alcaldia</option>
            </select>
            <label for="" id = "msjCargandoAlcaldias">Esperando estado...</label>
        <br/>

        <label>Colonia o asentamiento</label>
            <select name="colonia" id="selectColonias">
                <option value="">Seleccione alcaldia</option>
            </select>
            <label for="" id = "msjCargandoColonias">Esperando municipio...</label>
        <br/>

        <label>Calle</label>
        <input type="text" id = "cajaDeTextoCalle"/>
        <br/>

        <label>Numero</label>
        <input type="text" id = "cajaDeTextoNumero"/>
        <br/>

        <input type="button" value = "Guardar" onclick="obtenerDatos()"/>

    </div>

    <script>

        var direccion = 
        {
            cp: 0,
            estado: "",
            alcaldia: "",
            colonia: "",
            calle: "",
            numero: 0
        }

        let vocales = ["a", "e", "i", "o", "u"]
        let consonantes = ["b", "c", "d", "f", "g", "h", "j", "k", "l", "m", "n", "p", "q", "r", "s", "t", "v", "w", "x", "y", "z"]

        function obtenerDatos()
        {
            var cajaDeTextoCP = document.getElementById("cajaDeTextoCP")
            var cp = parseInt(cajaDeTextoCP.value, 10)
            direccion.cp = cp

            var cajaDeTextoEstado = document.getElementById("selectEstados")
            var estado = cajaDeTextoEstado.value
            direccion.estado = estado

            var cajaDeTextoAlcaldia = document.getElementById("selectAlcaldias")
            var alcaldia = cajaDeTextoAlcaldia.value
            direccion.alcaldia = alcaldia

            var cajaDeTextoColonia = document.getElementById("selectColonias")
            var colonia = cajaDeTextoColonia.value
            direccion.colonia = colonia

            var cajaDeTextoCalle = document.getElementById("cajaDeTextoCalle")
            var calle = cajaDeTextoCalle.value
            direccion.calle = calle

            var cajaDeTextoNumero = document.getElementById("cajaDeTextoNumero")
            var numero = parseInt(cajaDeTextoNumero.value, 10)
            direccion.numero = numero

            console.log(direccion)
        }

        async function listaEstadosAsync()
        {
            const myHeaders = new Headers();
            myHeaders.append("accept", "application/json");

            const requestOptions = 
            {
                method: "GET",
                headers: myHeaders,
                redirect: "follow"
            };

            const response = await fetch("https://utilidades.vmartinez84.xyz/api/CodigosPostales/Estados", requestOptions)
            const result = await response.json()
            return result
        }

        async function cargarSelect()
        {
            const array  = await listaEstadosAsync()
            const select = document.getElementById("selectEstados")
            for(let i = 0; i < array.length; i++)
            {
                const option = document.createElement("option")
                option.value = array[i].id
                option.textContent = array[i].nombre
                select.appendChild(option)
            }
            const labelCargando = document.getElementById("msjCargando")
            labelCargando.style.display = "none"
        }

        async function obtenerAlcaldiasAsync(estado)
        {
            const myHeaders = new Headers();
            myHeaders.append("accept", "application/json");

            const requestOptions = {
            method: "GET",
            headers: myHeaders,
            redirect: "follow"
            };

            const response = await fetch("https://utilidades.vmartinez84.xyz/api/CodigosPostales/" + estado + "/Alcaldias", requestOptions)
            const alcaldias = await response.json()
            return alcaldias
        }

        async function obtenerAlcaldiasCPAsync(cp)
        {
            const myHeaders = new Headers();
            myHeaders.append("accept", "application/json");

            const requestOptions = {
            method: "GET",
            headers: myHeaders,
            redirect: "follow"
            };

            const response = await fetch("https://utilidades.vmartinez84.xyz/api/CodigosPostales/" + cp, requestOptions)
            const estados = await response.json()
            return estados
        }

        /*Se cargan todas las funciones para enlazar a onLoad*/
        function cargarDatos()
        {
            //debugger
            cargarSelect()
        }

        async function cargarSelectAlcaldiasCP()
        {
            //Seleccionamos todos los selects y se limpian
            const selectAlc = document.getElementById("selectAlcaldias")
            selectAlc.innerHTML = ""

            const selectEst = document.getElementById("selectEstados")
            selectEst.innerHTML = ""

            const selectCol = document.getElementById("selectColonias")
            selectCol.innerHTML = ""
            
            var cajaDeTextoCP = document.getElementById("cajaDeTextoCP")
            var cp = parseInt(cajaDeTextoCP.value, 10)

            const datos = await obtenerAlcaldiasCPAsync(cp)

            const primerDato = datos[0]
            
            //Se cargan los estados de acuerdo al CP seleccionado
            const optionEst = document.createElement("option")
            optionEst.value = primerDato.estadoId
            optionEst.textContent = primerDato.estado
            selectEst.appendChild(optionEst)
            
            const optionAlc = document.createElement("option")
            optionAlc.value = primerDato.alcaldiaId
            optionAlc.textContent = primerDato.alcaldia
            selectAlc.appendChild(optionAlc)

            datos.forEach(element => 
            {
                const optionCol = document.createElement("option")
                optionCol.value = element.asentamiento
                optionCol.textContent = element.asentamiento
                selectCol.appendChild(optionCol)
            });

            const labelCargando1 = document.getElementById("msjCargando")
            labelCargando1.style.display = "none"

            const labelCargando2 = document.getElementById("msjCargandoAlcaldias")
            labelCargando2.style.display = "none"

            const labelCargando3 = document.getElementById("msjCargandoColonias")
            labelCargando3.style.display = "none"
        }
        
        async function cargarSelectAlcaldias()
        {
            debugger
            //Seleccionamos el select de las Alcaldias y se limpia
            const select = document.getElementById("selectAlcaldias")
            select.innerHTML = ""

            //Seleccionamos el select de Estados para obtener el valor
            const selectEstados = document.getElementById("selectEstados")
            const estado = selectEstados.value
            
            //Se cargan las alcaldias de acuerdo al estado seleccionado
            const alcaldias = await obtenerAlcaldiasAsync(estado) 
            for(let i = 0 ; i < alcaldias.length; i++)
            {
                const option = document.createElement("option")
                option.value = alcaldias[i].id
                option.textContent = alcaldias[i].nombre
                select.appendChild(option)
            }
            const labelCargando = document.getElementById("msjCargandoAlcaldias")
            labelCargando.style.display = "none"
        }
        
    </script>
</body>
</html>
